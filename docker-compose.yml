# # especificando a versão do schema docker-compose
# version: '3.9' (obsoleto, não é mais necessário especificar a versão, o compose vai usar a mais recente disponível)

# serviços definidos no docker-compose
services:

  # criando o serviço de backend
  backend:
    # falando onde está o Dockerfile do backend
    build: ./backend
    # falando/mapeando a porta do backend (host:container) container é 8000 fora dele usa essa ai tbm
    ports:
      - "8000:8000"
    # dizendo onde está o arquivo de variáveis de ambiente do backend para o container utilizar elas sem precisar colocar no Dockerfile (não copia pro container, apenas seta as variáveis de ambiente lá dentro)
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_URL=http://frontend:3000 # URL interna (rede do compose)
      # - BACKEND_URL=http://backend:8000 # URL interna (rede do compose)
    networks:
        - app-network
    # se o container cair reinicia ele automaticamente
    restart: unless-stopped
    
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      # URLs no Docker: use "backend:8000" entre containers, "localhost:8000" no navegador
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend # garantindo que o backend inicie antes do frontend
    networks:
        - app-network
    # se o container cair reinicia ele automaticamente
    restart: unless-stopped

  database:
      image: postgres:15-alpine
      ports:
        - "5432:5432"
      env_file:
        - ./database/.env
      environment:
        - POSTGRES_USER=${POSTGRES_USER:-postgres}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
        - POSTGRES_DB=${POSTGRES_DB:-nokia}
      volumes:
        - postgres-data:/var/lib/postgresql/data
      networks:
        - app-network
      restart: unless-stopped

# definindo a rede para os containers se comunicarem
networks:
  app-network:
    driver: bridge
  
volumes:
  postgres-data: